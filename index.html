<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APEX - Sistema Completo</title>
    <style>
        :root { --primary: #2F4EA1; --bg: #f4f6f8; }
        body { font-family: 'Segoe UI', sans-serif; background:var(--bg); margin:0; padding:20px; }
        .topo { background: var(--primary); color: white; padding: 15px 30px; }
        .menu { background: #1F3C88; padding: 10px 30px; display: flex; }
        .menu button { background: none; border: none; color: #cbd5e1; margin-right: 20px; cursor: pointer; padding: 10px; }
        .menu button.ativo { color: white; border-bottom: 2px solid #4da3ff; }
        .conteudo { padding: 40px; max-width: 1000px; margin: 0 auto; }
        .aba { display: none; } .aba.ativa { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .cell { border: 1px solid #ddd; padding: 8px; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.75rem; display: inline-flex; align-items: center; justify-content: center; width: 120px; height: 35px; margin: 2px; }
        .cell.selecionado { background: var(--primary); color: white; }
        .row-dia { display: flex; align-items: center; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { cursor: pointer; }
        .item-lista { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="topo"><strong>APEX</strong> <span>Agenda Prestadores</span></div>

<div class="menu">
    <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
    <button onclick="trocarAba('cadastro', this)">Prestadores</button>
    <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">
    <div id="consulta" class="aba ativa">
        <div id="step-cep" class="card">
            <h2>Novo Agendamento</h2>
            <input type="text" id="inputCep" placeholder="CEP">
            <button onclick="iniciarAgendamento()">Buscar</button>
        </div>
        <div id="step-agendamento" class="card" style="display:none;">
            <h3>Prestador</h3>
            <select id="selectPrestador" onchange="rdaAgendamento()"></select>
            <h3>Serviços</h3>
            <select id="produto"></select>
            <input type="number" id="quantidade" value="1">
            <button onclick="adicionarProduto()">Adicionar</button>
            <div id="lista-produtos"></div>
            <p><strong>Horas: <span id="horasNecessarias">0</span></strong></p>
            <h3>Agenda</h3>
            <div id="agenda-agendamento"></div>
            <button onclick="concluirAgendamento()">Finalizar</button>
        </div>
    </div>

    <div id="cadastro" class="aba">
        <div id="lista-prestadores-view" class="card">
            <button onclick="abrirCadastro()">+ Novo Prestador</button>
            <div id="lista-prestadores"></div>
        </div>
        <div id="cadastro-flow" class="card" style="display:none;">
            <div id="etapa-1">
                <h3>Dados</h3>
                <input id="nomeEmpresa" placeholder="Nome / Empresa">
                <input id="endereco" placeholder="Endereço">
                <input id="cidade" placeholder="Cidade">
                <input id="uf" placeholder="UF">
                <input id="cep" placeholder="CEP">
                <input id="responsavel" placeholder="Responsável">
                <input id="contatoResponsavel" placeholder="Contato">
            </div>
            <div id="etapa-2" style="display:none;">
                <h3>Agenda</h3>
                <div id="agenda-cadastro"></div>
            </div>
            <button onclick="mudarEtapa(-1)">Voltar</button>
            <button onclick="mudarEtapa(1)">Próximo</button>
            <button onclick="salvarPrestador()">Concluir</button>
        </div>
    </div>

    <div id="painel" class="aba"><div class="card" id="painel-conteudo"></div></div>
</div>

<script>
    let prestadores = [];
    let itensSelecionados = [];
    let agendamentos = [];
    let etapa = 1;
    let editingIndex = -1; // Controle de edição

    const produtos = {
        "Telemetria": [{desc:"Instalado veículos leves bloqueador", tempo:60}, {desc:"Instalado veículos leves e pesados + CAN", tempo:60}, {desc:"Instalado motos ou maquinários", tempo:40}, {desc:"Instalado veículos leves e pesados", tempo:40}],
        "Identificador": [{desc:"Instalado veículos leves e pesados identificador", tempo:60}, {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90}, {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60}, {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}],
        "Trava de ignição": [{desc:"Instalado veículos leves imobilizador", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90}, {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}],
        "Videotelemetria": [{desc:"CobliCam (2 câmeras)", tempo:90}, {desc:"Cobli Multicam (3 câmeras internas)", tempo:120}, {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240}, {desc:"Cobli Multicam (4 câmeras)", tempo:240}, {desc:"Cobli Multicam (5 câmeras)", tempo:300}]
    };

    window.onload = () => { carregarProdutos(); };

    function trocarAba(id, btn){
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
        if(btn) btn.classList.add('ativo');
    }

    function abrirCadastro(index = -1){
        editingIndex = index;
        document.getElementById("lista-prestadores-view").style.display="none";
        document.getElementById("cadastro-flow").style.display="block";
        criarGrid("agenda-cadastro");
        
        if(index !== -1) {
            document.getElementById("nomeEmpresa").value = prestadores[index].nome;
            prestadores[index].agenda.forEach(a => {
                let cells = document.querySelectorAll("#agenda-cadastro .cell");
                cells.forEach(c => {
                    if(c.dataset.dia === a.dia && c.dataset.hora === a.hora) c.classList.add("selecionado");
                });
            });
        } else {
            document.getElementById("nomeEmpresa").value = "";
        }
    }

    function mudarEtapa(dir){
        document.getElementById("etapa-"+etapa).style.display="none";
        etapa += dir;
        if(etapa < 1) etapa = 1; if(etapa > 2) etapa = 2;
        document.getElementById("etapa-"+etapa).style.display="block";
    }

    function criarGrid(id){
        let grid = document.getElementById(id);
        grid.innerHTML = "";
        let dias = ["Seg","Ter","Qua","Qui","Sex","Sab"];
        dias.forEach(d=>{
            let row = document.createElement("div"); row.className="row-dia";
            row.innerHTML = `<div style="width:80px">${d}</div>`;
            for(let h=8;h<=18;h++){
                let cell=document.createElement("div");
                cell.className="cell";
                cell.dataset.dia = d; cell.dataset.hora = `${h}:00`;
                let hNext = h+1;
                cell.innerText = `${d.toUpperCase()} - ${h}H - ${hNext}H`;
                cell.onclick=()=>cell.classList.toggle("selecionado");
                row.appendChild(cell);
            }
            grid.appendChild(row);
        });
    }

    function salvarPrestador(){
        let agenda = [...document.querySelectorAll('#agenda-cadastro .selecionado')].map(c => ({ dia: c.dataset.dia, hora: c.dataset.hora }));
        if(editingIndex === -1) {
            prestadores.push({ nome: document.getElementById("nomeEmpresa").value, agenda: agenda });
        } else {
            prestadores[editingIndex] = { nome: document.getElementById("nomeEmpresa").value, agenda: agenda };
        }
        renderizarListaPrestadores();
        atualizarSelectPrestadores();
        document.getElementById("cadastro-flow").style.display="none";
        document.getElementById("lista-prestadores-view").style.display="block";
    }

    function renderizarListaPrestadores(){
        document.getElementById("lista-prestadores").innerHTML = prestadores.map((p, i) => `
            <div class="card">
                ${p.nome} 
                <button onclick="abrirCadastro(${i})">Editar</button> 
                <button onclick="excluirPrestador(${i})">Excluir</button>
            </div>`).join('');
    }

    function excluirPrestador(i){ prestadores.splice(i,1); renderizarListaPrestadores(); atualizarSelectPrestadores(); }

    function atualizarSelectPrestadores(){
        let sel = document.getElementById("selectPrestador");
        sel.innerHTML = '<option value="">-- Escolha --</option>';
        prestadores.forEach((p,i) => sel.innerHTML += `<option value="${i}">${p.nome}</option>`);
    }

    function carregarProdutos(){
        let select=document.getElementById("produto");
        for(let tipo in produtos){
            let group=document.createElement("optgroup"); group.label=tipo;
            produtos[tipo].forEach(p=>{
                let opt=document.createElement("option"); opt.value=p.tempo; opt.text=p.desc;
                group.appendChild(opt);
            });
            select.appendChild(group);
        }
    }

    function adicionarProduto(){
        let select = document.getElementById("produto");
        let qtd = parseInt(document.getElementById("quantidade").value) || 1;
        let tempo = parseInt(select.value);
        itensSelecionados.push({desc: select.options[select.selectedIndex].text, tempo: tempo * qtd});
        
        let total = itensSelecionados.reduce((a, b) => a + b.tempo, 0);
        document.getElementById("horasNecessarias").innerText = Math.ceil(total/60);
        
        let lista = document.getElementById("lista-produtos");
        lista.innerHTML = itensSelecionados.map((i, idx) => `<div class="item-lista">${i.desc} <button onclick="itensSelecionados.splice(${idx},1); adicionarProduto();">x</button></div>`).join('');
    }

    function iniciarAgendamento(){
        if(prestadores.length === 0){ alert("Cadastre um prestador!"); return; }
        document.getElementById("step-cep").style.display="none";
        document.getElementById("step-agendamento").style.display="block";
    }

    function rdaAgendamento(){
        let idx = document.getElementById("selectPrestador").value;
        let horasLimite = parseInt(document.getElementById("horasNecessarias").innerText);
        if(horasLimite === 0){ alert("Adicione um serviço antes!"); document.getElementById("selectPrestador").value=""; return; }
        
        let container = document.getElementById("agenda-agendamento");
        container.innerHTML = "";
        
        prestadores[idx].agenda.forEach(item => {
            let div = document.createElement("div");
            div.className = "cell";
            let h = parseInt(item.hora);
            div.innerText = `${item.dia.toUpperCase()} - ${h}H - ${h+1}H`;
            div.onclick = () => {
                let sel = document.querySelectorAll("#agenda-agendamento .selecionado");
                if(!div.classList.contains("selecionado") && sel.length >= horasLimite) {
                    alert("Você só pode selecionar " + horasLimite + " hora(s)!");
                    return;
                }
                div.classList.toggle("selecionado");
            };
            container.appendChild(div);
        });
    }

    function concluirAgendamento(){
        let horasLimite = parseInt(document.getElementById("horasNecessarias").innerText);
        let selecionados = document.querySelectorAll("#agenda-agendamento .selecionado");
        
        if(selecionados.length !== horasLimite) {
            alert("Selecione exatamente " + horasLimite + " hora(s).");
            return;
        }
        
        agendamentos.push({ prestador: prestadores[document.getElementById("selectPrestador").value].nome, data: new Date().toLocaleDateString() });
        document.getElementById("painel-conteudo").innerHTML = agendamentos.map(a => `<div class="card">Agendado para: ${a.prestador} - ${a.data}</div>`).join('');
        
        alert("Agendamento concluído!");
        trocarAba('painel', document.querySelectorAll('.menu button')[2]);
    }
</script>
</body>
</html>
