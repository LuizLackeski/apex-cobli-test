<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APEX - Sistema Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2F4EA1; --bg: #f4f6f8; }
        body { font-family: 'Segoe UI', sans-serif; background:var(--bg); margin:0; padding:20px; }
        .topo { background: var(--primary); color: white; padding: 15px 30px; }
        .menu { background: #1F3C88; padding: 10px 30px; display: flex; }
        .menu button { background: none; border: none; color: #cbd5e1; margin-right: 20px; cursor: pointer; padding: 10px; }
        .menu button.ativo { color: white; border-bottom: 2px solid #4da3ff; }
        .conteudo { padding: 40px; max-width: 1000px; margin: 0 auto; }
        .aba { display: none; } .aba.ativa { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .agenda-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 10px; }
        .cell { border: 1px solid #ddd; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
        .cell.selecionado { background: var(--primary); color: white; border-color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button.acao { background: #4C5EB0; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; }
        .item-lista { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="topo"><strong>APEX</strong> <span>Agenda Prestadores</span></div>
<div class="menu">
    <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
    <button onclick="trocarAba('cadastro', this)">Prestadores</button>
    <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">
    <div id="consulta" class="aba ativa">
        <div id="step-cep" class="card">
            <h2>Novo Agendamento</h2>
            <input type="text" id="inputCep" placeholder="Digite o CEP (00000-000)">
            <button class="acao" onclick="iniciarAgendamento()">Buscar Endereço</button>
        </div>
        <div id="step-agendamento" class="card" style="display: none;">
            <h3>1. Prestador</h3>
            <select id="selectPrestador" onchange="renderizarAgendaAgendamento()">
                <option value="">-- Escolha um prestador --</option>
            </select>
            <h3>2. Serviços</h3>
            <select id="produto"></select>
            <input type="number" id="quantidade" value="1" min="1" placeholder="Quantidade">
            <button class="acao" onclick="adicionarProduto()">+ Adicionar Item</button>
            <div id="lista-produtos" style="margin-top:15px; border:1px solid #ddd; border-radius:8px; padding:10px;"></div>
            <p><strong>Total Horas Necessárias: <span id="horasNecessarias">0</span>h</strong></p>
            <h3>3. Agenda</h3>
            <div id="agenda-agendamento" class="agenda-grid"></div>
            <button class="acao" style="background:#28a745; margin-top:20px;" onclick="concluirAgendamento()">Finalizar Agendamento</button>
            <button onclick="resetarTelaParaInicio()" style="background:none; color:red; border:none; margin-top:10px; width:100%; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="cadastro" class="aba">
        <div id="lista-prestadores-view" class="card">
            <h2>Prestadores</h2>
            <button class="acao" onclick="abrirCadastro()">+ Novo Prestador</button>
            <div id="lista-prestadores" style="margin-top: 20px;"></div>
        </div>
        <div id="cadastro-flow" class="card" style="display:none;">
            <h3>Cadastro de Prestador</h3>
            <input id="nomeEmpresa" placeholder="Razão Social *">
            <p>Marque os horários (Seg-Sex, 08h-18h):</p>
            <div id="agenda-cadastro" class="agenda-grid"></div>
            <button class="acao" style="margin-top:20px; background:#28a745;" onclick="salvarPrestador()">Salvar Prestador</button>
            <button onclick="resetCadastro()" style="background:none; border:none; color:red; cursor:pointer; width:100%;">Cancelar</button>
        </div>
    </div>
    <div id="painel" class="aba"><div class="card">Total de Agendamentos: <strong id="total">0</strong></div></div>
</div>

<script>
    // Configuração Supabase
    const supabase = supabase.createClient('https://tmjmjrhgmyqamuphgdvi.supabase.co', 'SUA_CHAVE_AQUI');

    const produtos = {
        "Telemetria": [{desc:"Instalado veículos leves bloqueador", tempo:60}, {desc:"Instalado veículos leves e pesados + CAN", tempo:60}, {desc:"Instalado motos ou maquinários", tempo:40}, {desc:"Instalado veículos leves e pesados", tempo:40}],
        "Identificador": [{desc:"Instalado veículos leves e pesados identificador", tempo:60}, {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90}, {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60}, {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}],
        "Trava de ignição": [{desc:"Instalado veículos leves imobilizador", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90}, {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}],
        "Videotelemetria": [{desc:"CobliCam (2 câmeras)", tempo:90}, {desc:"Cobli Multicam (3 câmeras internas)", tempo:120}, {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240}, {desc:"Cobli Multicam (4 câmeras)", tempo:240}, {desc:"Cobli Multicam (5 câmeras)", tempo:300}]
    };

    let prestadores = [];
    let itensSelecionados = [];
    let editingId = null;

    window.onload = () => {
        carregarProdutos();
        criarGrid('agenda-cadastro');
        carregarPrestadores(); // Não usamos await para não travar o carregamento da página
    };

    function carregarProdutos() {
        let select = document.getElementById("produto");
        for (let t in produtos) {
            let g = document.createElement('optgroup'); g.label = t;
            produtos[t].forEach(p => { let o = document.createElement("option"); o.text = p.desc; o.value = p.tempo; g.appendChild(o); });
            select.appendChild(g);
        }
    }

    async function carregarPrestadores() {
        try {
            let { data } = await supabase.from('prestadores').select('*');
            prestadores = data || [];
            atualizarSelect();
            renderizarLista();
        } catch(e) { console.warn("Banco indisponível, modo local."); }
    }

    async function salvarPrestador() {
        let agenda = [];
        document.querySelectorAll('#agenda-cadastro .cell.selecionado').forEach(c => agenda.push(c.innerText));
        let dados = { nome: document.getElementById("nomeEmpresa").value, agenda: agenda };
        
        try {
            if(!editingId) await supabase.from('prestadores').insert([dados]);
            else await supabase.from('prestadores').update(dados).eq('id', editingId);
            resetCadastro();
            carregarPrestadores();
        } catch(e) { alert("Erro ao salvar no banco."); }
    }

    async function excluirPrestador(id) {
        await supabase.from('prestadores').delete().eq('id', id);
        carregarPrestadores();
    }

    // Funcionalidades de Interface (sempre funcionam)
    function trocarAba(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
    }

    function abrirCadastro(id = null) {
        editingId = id;
        document.getElementById("lista-prestadores-view").style.display = "none";
        document.getElementById("cadastro-flow").style.display = "block";
    }

    function resetCadastro() {
        document.getElementById("lista-prestadores-view").style.display = "block";
        document.getElementById("cadastro-flow").style.display = "none";
    }

    function adicionarProduto() {
        let s = document.getElementById("produto");
        let q = parseInt(document.getElementById("quantidade").value);
        itensSelecionados.push({desc: `${s.options[s.selectedIndex].text} (Qtd: ${q})`, tempo: parseInt(s.value) * q});
        renderizarListaProdutos();
    }

    function renderizarListaProdutos() {
        let totalMinutos = itensSelecionados.reduce((acc, i) => acc + i.tempo, 0);
        document.getElementById("horasNecessarias").innerText = Math.ceil(totalMinutos / 60);
        document.getElementById("lista-produtos").innerHTML = itensSelecionados.map((i, idx) => `
            <div class="item-lista">${i.desc} <button onclick="itensSelecionados.splice(${idx},1); renderizarListaProdutos();">x</button></div>
        `).join('');
    }

    function renderizarAgendaAgendamento() {
        let idx = document.getElementById("selectPrestador").value;
        let p = prestadores.find(x => x.id == idx);
        let c = document.getElementById("agenda-agendamento"); c.innerHTML = "";
        let slotsMax = parseInt(document.getElementById("horasNecessarias").innerText);
        
        if(!p) return;
        p.agenda.forEach(hora => {
            let b = document.createElement("div"); b.className = "cell"; b.innerText = hora;
            b.onclick = () => {
                let sel = document.querySelectorAll('#agenda-agendamento .cell.selecionado');
                if(sel.length >= slotsMax && !b.classList.contains('selecionado')) return alert("Limite de "+slotsMax+"h!");
                b.classList.toggle("selecionado");
            };
            c.appendChild(b);
        });
    }

    function criarGrid(id) {
        const grid = document.getElementById(id);
        ['Seg','Ter','Qua','Qui','Sex'].forEach(d => {
            for(let h=8; h<=18; h++){
                let c = document.createElement('div'); c.className="cell"; c.innerText = `${d} ${h}:00`;
                c.onclick = () => c.classList.toggle("selecionado");
                grid.appendChild(c);
            }
        });
    }

    function atualizarSelect() {
        let sel = document.getElementById("selectPrestador");
        sel.innerHTML = '<option value="">-- Escolha --</option>';
        prestadores.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.nome}</option>`);
    }

    function renderizarLista() {
        document.getElementById("lista-prestadores").innerHTML = prestadores.map(p => `
            <div class="card" style="padding:10px; margin-bottom:5px;">${p.nome} 
                <button onclick="abrirCadastro('${p.id}')">Editar</button> <button onclick="excluirPrestador('${p.id}')">Excluir</button>
            </div>
        `).join('');
    }

    function resetarTelaParaInicio() { location.reload(); }
    function concluirAgendamento() { 
        let slotsMax = parseInt(document.getElementById("horasNecessarias").innerText);
        if(document.querySelectorAll('#agenda-agendamento .cell.selecionado').length !== slotsMax) return alert("Selecione "+slotsMax+" horários.");
        alert("Agendamento concluído!"); resetarTelaParaInicio(); 
    }
</script>
</body>
</html>
