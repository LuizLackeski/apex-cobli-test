<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX</title>

<style>
body { margin:0; font-family: Arial; background:#f4f6f8; }

.topo {
  background:#2F4EA1;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
}

.menu { background:#1F3C88; padding:10px 30px; }

.menu button {
  background:none;
  border:none;
  color:#cbd5e1;
  margin-right:20px;
  font-size:16px;
  cursor:pointer;
}

.menu button.ativo {
  color:white;
  border-bottom:2px solid #4da3ff;
}

.conteudo { padding:30px; }

.aba { display:none; }
.ativa { display:block; }

.card {
  background:white;
  padding:20px;
  border-radius:8px;
  margin-bottom:20px;
}

input, select {
  padding:8px;
  margin:5px 5px 10px 0;
}

button.acao {
  background:#2F4EA1;
  color:white;
  border:none;
  padding:8px 15px;
  cursor:pointer;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="topo">
  <strong>Cobli | APEX</strong>
  <span>Agenda Prestadores</span>
</div>

<div class="menu">
  <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
  <button onclick="trocarAba('cadastro', this)">Prestadores</button>
  <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">

<!-- ================= AGENDAMENTO ================= -->
<div id="consulta" class="aba ativa">

  <div class="card">
    <h2>Novo Agendamento</h2>
    <input placeholder="Digite endereço ou CEP">
    <button class="acao" onclick="buscar()">Buscar</button>
  </div>

  <div id="fluxo-agendamento" style="display:none;">

    <div class="card">
      <strong id="prestadorSelecionado"></strong>
    </div>

    <div class="card">
      <h3>Produtos</h3>

      <select id="produto">
        <option value="1">Produto A - 1h</option>
        <option value="2">Produto B - 2h</option>
      </select>

      <input type="number" id="quantidade" placeholder="Qtd">

      <button class="acao" onclick="calcularTempo()">Adicionar</button>

      <p>Tempo total: <strong id="tempoTotal">0h</strong></p>
    </div>

    <div class="card">
      <h3>Selecionar Dia</h3>
      <select id="diaSelecionado" onchange="carregarHorarios()">
        <option value="">Selecione</option>
        <option value="Seg">Segunda</option>
        <option value="Ter">Terça</option>
        <option value="Qua">Quarta</option>
        <option value="Qui">Quinta</option>
        <option value="Sex">Sexta</option>
        <option value="Sáb">Sábado</option>
        <option value="Dom">Domingo</option>
      </select>

      <h3>Horários disponíveis</h3>
      <div id="horarios"></div>
      <p id="alertaTempo" style="color:red;"></p>
    </div>

  </div>

</div>

<!-- ================= CADASTRO ================= -->
<div id="cadastro" class="aba">

  <div id="lista-prestadores-view">
    <div class="card">
      <h2>Prestadores</h2>
      <button class="acao" onclick="abrirCadastro()">+ Cadastrar Prestador</button>
      <div id="lista-prestadores"></div>
    </div>
  </div>

  <div id="cadastro-flow" style="display:none;">

    <div class="card">
      <h3>Cadastro de Prestador</h3>
      <p>Etapa <span id="etapaAtual">1</span> de 4</p>
    </div>

    <!-- ETAPA 1 -->
    <div class="card etapa" id="etapa1">
      <input id="nome" placeholder="Nome"><br>
      <input id="telefone" placeholder="Telefone"><br>
      <input id="contato" placeholder="Contato"><br>
      <input id="tecnicos" type="number" placeholder="Qtd Técnicos"><br>
    </div>

    <!-- ETAPA 2 -->
    <div class="card etapa" id="etapa2" style="display:none;">
      <input id="endereco" placeholder="Endereço"><br>
      <input id="raio" type="number" placeholder="Raio (km 1-100)">
    </div>

    <!-- ETAPA 3 -->
    <div class="card etapa" id="etapa3" style="display:none;">
      <h4>Agenda</h4>
      <div id="agenda-semana"></div>
    </div>

    <!-- ETAPA 4 -->
    <div class="card etapa" id="etapa4" style="display:none;">
      <h4>Revisão</h4>
      <button class="acao" onclick="salvarPrestador()">Salvar Prestador</button>
    </div>

    <div class="card">
      <button onclick="voltarEtapa()">Voltar</button>
      <button class="acao" onclick="proximaEtapa()">Próximo</button>
    </div>

  </div>

</div>

<!-- ================= PAINEL ================= -->
<div id="painel" class="aba">
  <div class="card">
    <h2>Painel</h2>
    <div id="lista-agendamentos"></div>
  </div>
</div>

</div>

<script>

/* ===== ABAS ===== */
function trocarAba(id, botao) {
  document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');

  document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
  botao.classList.add('ativo');
}

/* ===== DADOS ===== */
let prestadores = [];
let agendaPrestador = {};
let etapa = 1;

/* ===== CADASTRO ===== */
function abrirCadastro() {
  document.getElementById("lista-prestadores-view").style.display = "none";
  document.getElementById("cadastro-flow").style.display = "block";
}

function proximaEtapa() {

  if (etapa === 2) {
    const raio = document.getElementById("raio").value;
    if (!raio || raio <= 0 || raio > 100) {
      alert("Raio deve ser entre 1 e 100 km");
      return;
    }
  }

  if (etapa < 4) {
    document.getElementById("etapa" + etapa).style.display = "none";
    etapa++;
    document.getElementById("etapa" + etapa).style.display = "block";
    document.getElementById("etapaAtual").innerText = etapa;

    if (etapa === 3) gerarAgenda();
  }
}

function voltarEtapa() {
  if (etapa > 1) {
    document.getElementById("etapa" + etapa).style.display = "none";
    etapa--;
    document.getElementById("etapa" + etapa).style.display = "block";
    document.getElementById("etapaAtual").innerText = etapa;
  }
}

/* ===== AGENDA ===== */
const dias = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];

function gerarAgenda() {
  const container = document.getElementById("agenda-semana");
  container.innerHTML = "";

  dias.forEach(dia => {
    const div = document.createElement("div");

    const titulo = document.createElement("strong");
    titulo.innerText = dia;
    div.appendChild(titulo);

    for (let h = 8; h <= 18; h++) {
      const btn = document.createElement("button");
      btn.innerText = h;

      btn.onclick = () => {
        if (!agendaPrestador[dia]) agendaPrestador[dia] = [];

        if (agendaPrestador[dia].includes(h)) {
          agendaPrestador[dia] = agendaPrestador[dia].filter(x => x !== h);
          btn.style.background = "";
        } else {
          agendaPrestador[dia].push(h);
          btn.style.background = "#2F4EA1";
          btn.style.color = "white";
        }
      };

      div.appendChild(btn);
    }

    container.appendChild(div);
  });
}

/* ===== SALVAR ===== */
function salvarPrestador() {

  prestadores.push({
    nome: document.getElementById("nome").value,
    endereco: document.getElementById("endereco").value,
    tecnicos: document.getElementById("tecnicos").value,
    raio: document.getElementById("raio").value,
    agenda: JSON.parse(JSON.stringify(agendaPrestador))
  });

  alert("Salvo!");

  resetCadastro();
  renderizarPrestadores();
}

function renderizarPrestadores() {
  const lista = document.getElementById("lista-prestadores");
  lista.innerHTML = "";

  prestadores.forEach(p => {
    const div = document.createElement("div");
    div.innerHTML = `<strong>${p.nome}</strong> - ${p.endereco} (Raio ${p.raio}km)`;
    lista.appendChild(div);
  });
}

function resetCadastro() {
  document.getElementById("cadastro-flow").style.display = "none";
  document.getElementById("lista-prestadores-view").style.display = "block";

  etapa = 1;
  agendaPrestador = {};

  document.querySelectorAll(".etapa").forEach((e,i)=>{
    e.style.display = i===0?"block":"none";
  });

  document.getElementById("etapaAtual").innerText = 1;
}

/* ===== AGENDAMENTO ===== */
function buscar() {
  if (prestadores.length === 0) {
    alert("Cadastre um prestador primeiro");
    return;
  }

  document.getElementById("fluxo-agendamento").style.display = "block";

  const p = prestadores[0]; // pega primeiro (simulação)
  document.getElementById("prestadorSelecionado").innerText = p.nome;

  agendaPrestador = p.agenda;
}

let tempoTotal = 0;
let horariosSelecionados = [];

function calcularTempo() {
  const produto = parseInt(document.getElementById("produto").value);
  const qtd = parseInt(document.getElementById("quantidade").value || 0);

  tempoTotal += produto * qtd;
  document.getElementById("tempoTotal").innerText = tempoTotal + "h";
}

function carregarHorarios() {
  const dia = document.getElementById("diaSelecionado").value;
  const container = document.getElementById("horarios");

  container.innerHTML = "";
  horariosSelecionados = [];

  if (!agendaPrestador[dia]) {
    container.innerHTML = "Sem horários";
    return;
  }

  agendaPrestador[dia].forEach(h => {
    const btn = document.createElement("button");
    btn.innerText = h;

    btn.onclick = () => {
      if (horariosSelecionados.includes(h)) {
        horariosSelecionados = horariosSelecionados.filter(x=>x!==h);
        btn.style.background="";
      } else {
        horariosSelecionados.push(h);
        btn.style.background="#2F4EA1";
        btn.style.color="white";
      }
      validarTempo();
    };

    container.appendChild(btn);
  });
}

function validarTempo() {
  const alerta = document.getElementById("alertaTempo");

  if (horariosSelecionados.length < tempoTotal) {
    alerta.innerText = "Tempo insuficiente";
    return;
  }

  const fim = Math.max(...horariosSelecionados)+1;

  if (fim > 19) {
    alerta.innerText = "Excede limite (19h)";
    return;
  }

  alerta.innerText = "";
}

</script>

</body>
</html>
