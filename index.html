<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX</title>

<style>
body { margin:0; font-family: Arial; background:#f4f6f8; }

.topo { background:#2F4EA1; color:white; padding:15px 30px; }
.menu { background:#1F3C88; padding:10px 30px; }

.menu button {
  background:none; border:none; color:#cbd5e1;
  margin-right:20px; cursor:pointer;
}
.menu button.ativo { color:white; border-bottom:2px solid #4da3ff; }

.conteudo { padding:30px; }
.aba { display:none; }
.ativa { display:block; }

.card {
  background:white; padding:20px;
  border-radius:8px; margin-bottom:20px;
}

input, select {
  width:100%; padding:8px; margin:5px 0;
}

button {
  padding:6px 10px;
  margin:3px;
  cursor:pointer;
}

.acao {
  background:#2F4EA1;
  color:white;
  border:none;
  border-radius:4px;
}

.horas { display:flex; flex-wrap:wrap; gap:5px; }

.hora {
  width:55px;
  border:1px solid #ccc;
  background:white;
}

.hora.ativa {
  background:#2F4EA1;
  color:white;
}
</style>
</head>

<body>

<div class="topo"><strong>APEX</strong></div>

<div class="menu">
  <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
  <button onclick="trocarAba('cadastro', this)">Prestadores</button>
  <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">

<!-- AGENDAMENTO -->
<div id="consulta" class="aba ativa">

  <div class="card">
    <input id="enderecoBusca" placeholder="Endereço ou CEP">
    <button class="acao" onclick="buscar()">Buscar</button>
  </div>

  <div class="card">
    <h3>Prestadores</h3>
    <div id="lista-prestadores-ag"></div>
  </div>

  <div id="bloco-agendamento" style="display:none;">

    <div class="card">
      <h3>Produtos</h3>

      <select id="produto"></select>
      <input type="number" id="quantidade" placeholder="Qtd">
      <button class="acao" onclick="adicionarItem()">Adicionar</button>

      <div id="lista-itens"></div>
      <p>Total: <strong id="tempoTotal">0h</strong></p>

      <button class="acao" onclick="liberarAgenda()">Avançar para agenda</button>
    </div>

    <div id="agenda-bloco" class="card" style="display:none;">
      <h3>Agenda disponível</h3>
      <div id="agenda-agendamento"></div>
    </div>

    <div class="card">
      <button class="acao" onclick="concluirAgendamento()">Concluir</button>
    </div>

  </div>

</div>

<!-- CADASTRO (mantido como estava funcionando) -->
<div id="cadastro" class="aba">
  <div id="lista-view" class="card">
    <button class="acao" onclick="abrirCadastro()">+ Cadastrar</button>
    <div id="lista-prestadores"></div>
  </div>

  <div id="form-view" style="display:none;">
    <div class="card">
      <input id="empresa" placeholder="Empresa">
      <input id="tecnicos" placeholder="Qtd técnicos">
      <div id="agenda"></div>
    </div>

    <div class="card">
      <button onclick="cancelarCadastro()">Cancelar</button>
      <button class="acao" onclick="salvarPrestador()">Salvar</button>
    </div>
  </div>
</div>

<!-- PAINEL -->
<div id="painel" class="aba">
  <div class="card">
    Hoje: <strong id="hoje">0</strong><br>
    Total: <strong id="total">0</strong>
  </div>
  <div class="card" id="lista-agendamentos"></div>
</div>

</div>

<script>

/* ===== DADOS ===== */
let prestadores = [];
let agendamentos = [];
let agendaPrestador = {};
let prestadorSelecionadoIndex = null;
let itensAgendamento = [];
let tempoTotal = 0;
let horariosSelecionados = [];
let ocupacao = {};

/* ===== PRODUTOS COMPLETOS ===== */
const produtos = [
  { tipo:"Identificador", desc:"Identificador", tempo:60 },
  { tipo:"Identificador", desc:"Identificador + CAN", tempo:90 },
  { tipo:"Identificador", desc:"Identificador RFID", tempo:60 },
  { tipo:"Identificador", desc:"Identificador RFID + CAN", tempo:80 },

  { tipo:"Telemetria", desc:"Bloqueador", tempo:60 },
  { tipo:"Telemetria", desc:"Telemetria + CAN", tempo:60 },
  { tipo:"Telemetria", desc:"Motos ou maquinários", tempo:40 },
  { tipo:"Telemetria", desc:"Veículos leves e pesados", tempo:40 },

  { tipo:"Trava de ignição", desc:"Imobilizador", tempo:80 },
  { tipo:"Trava de ignição", desc:"Imobilizador RFID", tempo:80 },
  { tipo:"Trava de ignição", desc:"Imobilizador RFID + CAN", tempo:90 },
  { tipo:"Trava de ignição", desc:"Imobilizador + CAN", tempo:100 },

  { tipo:"Videotelemetria", desc:"CobliCam (2 câmeras)", tempo:90 },
  { tipo:"Videotelemetria", desc:"Multicam 3 câmeras", tempo:120 },
  { tipo:"Videotelemetria", desc:"Multicam 2+1", tempo:240 },
  { tipo:"Videotelemetria", desc:"Multicam 4 câmeras", tempo:240 },
  { tipo:"Videotelemetria", desc:"Multicam 5 câmeras", tempo:300 }
];

/* ===== INIT ===== */
window.onload = function(){
  let s=document.getElementById("produto");

  produtos.forEach((p,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.text=p.tipo+" - "+p.desc;
    s.appendChild(o);
  });
};

/* ===== AGENDAMENTO ===== */
function buscar(){
  let l=document.getElementById("lista-prestadores-ag");
  l.innerHTML="";

  prestadores.forEach((p,i)=>{
    let b=document.createElement("button");
    b.innerText=p.empresa;
    b.onclick=()=>{
      prestadorSelecionadoIndex=i;
      document.getElementById("bloco-agendamento").style.display="block";
    };
    l.appendChild(b);
  });
}

function adicionarItem(){
  let p=produtos[produto.value];
  let q=parseInt(quantidade.value||0);
  if(!q) return;

  itensAgendamento.push({nome:p.desc,tempo:p.tempo,qtd:q});
  renderizarItens();
}

function renderizarItens(){
  let c=document.getElementById("lista-itens");
  c.innerHTML="";
  tempoTotal=0;

  itensAgendamento.forEach((i,index)=>{
    tempoTotal+=i.tempo*i.qtd;

    let d=document.createElement("div");
    d.innerHTML=`<strong>${i.nome}</strong> (${i.qtd}) <button onclick="removerItem(${index})">X</button>`;
    c.appendChild(d);
  });

  document.getElementById("tempoTotal").innerText=(tempoTotal/60).toFixed(1)+"h";
}

function removerItem(i){
  itensAgendamento.splice(i,1);
  renderizarItens();
}

function liberarAgenda(){
  if(itensAgendamento.length===0){
    alert("Adicione produtos");
    return;
  }

  document.getElementById("agenda-bloco").style.display="block";
  mostrarAgenda(prestadores[prestadorSelecionadoIndex]);
}

function mostrarAgenda(prestador){

  let c=document.getElementById("agenda-agendamento");
  c.innerHTML="";
  horariosSelecionados=[];

  Object.keys(prestador.agenda).forEach(dia=>{
    if(prestador.agenda[dia].length===0) return;

    let div=document.createElement("div");
    div.innerHTML="<strong>"+dia+"</strong>";

    let hDiv=document.createElement("div");
    hDiv.className="horas";

    prestador.agenda[dia].forEach(h=>{

      let chave = prestadorSelecionadoIndex+"_"+h;
      let usados = ocupacao[chave]||0;

      let b=document.createElement("button");
      b.innerText=h;
      b.className="hora";

      if(usados >= prestador.tecnicos){
        b.disabled=true;
        b.style.background="#ccc";
      } else {
        b.onclick=()=>{
          b.classList.toggle("ativa");

          if(horariosSelecionados.includes(h)){
            horariosSelecionados=horariosSelecionados.filter(x=>x!==h);
          } else {
            horariosSelecionados.push(h);
          }
        };
      }

      hDiv.appendChild(b);
    });

    div.appendChild(hDiv);
    c.appendChild(div);
  });
}

function concluirAgendamento(){

  horariosSelecionados.forEach(h=>{
    let chave=prestadorSelecionadoIndex+"_"+h;
    ocupacao[chave]=(ocupacao[chave]||0)+1;
  });

  agendamentos.push({
    prestador: prestadores[prestadorSelecionadoIndex].empresa,
    data: new Date().toISOString().split("T")[0]
  });

  alert("Agendado!");
}

/* ===== CADASTRO ===== */
function abrirCadastro(){
  document.getElementById("form-view").style.display="block";
}

function salvarPrestador(){
  prestadores.push({
    empresa: empresa.value,
    tecnicos: parseInt(tecnicos.value||1),
    agenda:{Seg:[8,9,10],Ter:[10,11]}
  });
  alert("Salvo");
}

</script>

</body>
</html>
