<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APEX - Sistema Completo</title>
    <style>
        :root { --primary: #2F4EA1; --bg: #f4f6f8; }
        body { font-family: 'Segoe UI', sans-serif; background:var(--bg); margin:0; padding:20px; }
        .topo { background: var(--primary); color: white; padding: 15px 30px; }
        .menu { background: #1F3C88; padding: 10px 30px; display: flex; }
        .menu button { background: none; border: none; color: #cbd5e1; margin-right: 20px; cursor: pointer; padding: 10px; }
        .menu button.ativo { color: white; border-bottom: 2px solid #4da3ff; }
        .conteudo { padding: 40px; max-width: 1000px; margin: 0 auto; }
        .aba { display: none; } .aba.ativa { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .agenda-day-card { background: #fff; padding: 8px; border-radius: 7px; margin-bottom: 8px; border: 1px solid #e0e0e0; }
        .cell { border: 1px solid #ddd; padding: 5px; text-align: center; cursor: pointer; border-radius: 3px; font-size: 0.75rem; display: inline-flex; width: 40px; height: 18px; align-items: center; justify-content: center; }
        .cell.selecionado { background: var(--primary); color: white; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { cursor: pointer; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; }
    </style>
</head>
<body>
<div class="topo"><strong>APEX</strong></div>
<div class="menu">
    <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
    <button onclick="trocarAba('cadastro', this)">Prestadores</button>
</div>
<div class="conteudo">
    <div id="consulta" class="aba ativa">
        <div id="step-1" class="card">
            <input type="text" id="inputCep" placeholder="CEP do cliente">
            <button onclick="proximoPasso(2)" id="btnBuscar">Buscar Prestadores</button>
        </div>
        <div id="step-2" class="card" style="display:none;"><div id="lista-prestadores-selecao"></div></div>
        <div id="step-3" class="card" style="display:none;">
            <select id="produto"></select>
            <button onclick="adicionarProduto()">Adicionar</button>
            <div id="lista-produtos"></div>
            <div id="agenda-agendamento"></div>
            <button onclick="concluirAgendamentoFinal()" style="background:green;">Confirmar</button>
        </div>
        <div id="step-4" class="card" style="display:none;">
             <input id="ticket" placeholder="Ticket">
             <input id="clienteNome" placeholder="Cliente">
             <input id="solicitante" placeholder="Solicitante">
             <button onclick="concluirAgendamentoFinal()" style="background:green;">Finalizar</button>
        </div>
    </div>
    <div id="cadastro" class="aba">
        <div id="lista-prestadores-view" class="card">
            <button onclick="abrirCadastro()">+ Novo Prestador</button>
            <div id="lista-prestadores"></div>
        </div>
    </div>
</div>
<script>
    let prestadores = [], agendamentos = [];
    window.onload = async () => { await carregarDadosDoBanco(); };

    async function carregarDadosDoBanco() {
        // SEM O LOCALHOST:3000!
        const resP = await fetch('/api/prestadores'); 
        prestadores = await resP.json();
        const resA = await fetch('/api/agendamentos');
        agendamentos = await resA.json();
    }

    async function salvarPrestador(p, editingIndex) {
        const url = (editingIndex !== -1) ? `/api/prestadores/${prestadores[editingIndex].id}` : '/api/prestadores';
        const method = (editingIndex !== -1) ? 'PUT' : 'POST';
        await fetch(url, { 
            method: method, 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(p) 
        });
        await carregarDadosDoBanco();
    }
</script>
</body>
</html>
