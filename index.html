<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX - Sistema Completo</title>

<style>
:root { --primary: #2F4EA1; --bg: #f4f6f8; }

body { font-family: 'Segoe UI', sans-serif; background:var(--bg); margin:0; padding:20px; }

.topo { background: var(--primary); color: white; padding: 15px 30px; }

.menu { background: #1F3C88; padding: 10px 30px; display: flex; }

.menu button { background: none; border: none; color: #cbd5e1; margin-right: 20px; cursor: pointer; padding: 10px; }

.menu button.ativo { color: white; border-bottom: 2px solid #4da3ff; }

.conteudo { padding: 40px; max-width: 1000px; margin: 0 auto; }

.aba { display: none; }
.aba.ativa { display: block; }

.card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

.cell {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
    cursor: pointer;
    border-radius: 4px;
    font-size: 0.75rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 55px;
    height: 28px;
    margin: 2px;
}

.cell.selecionado {
    background: var(--primary);
    color: white;
}

.row-dia {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
}

button { cursor: pointer; }

.item-lista {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="topo"><strong>APEX</strong> <span>Agenda Prestadores</span></div>

<div class="menu">
<button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
<button onclick="trocarAba('cadastro', this)">Prestadores</button>
<button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">

<!-- ================= AGENDAMENTO ================= -->
<div id="consulta" class="aba ativa">

<div id="step-cep" class="card">
<h2>Novo Agendamento</h2>
<input type="text" id="inputCep">
<button onclick="iniciarAgendamento()">Buscar</button>
</div>

<div id="step-agendamento" class="card" style="display:none;">

<h3>Prestador</h3>
<select id="selectPrestador" onchange="renderizarAgendaAgendamento()"></select>

<h3>Serviços</h3>

<select id="produto"></select>
<input type="number" id="quantidade" value="1">
<button onclick="adicionarProduto()">Adicionar</button>

<div id="lista-produtos"></div>

<p><strong>Horas: <span id="horasNecessarias">0</span></strong></p>

<h3>Agenda</h3>
<div id="agenda-agendamento"></div>

<button onclick="concluirAgendamento()">Finalizar</button>

</div>
</div>

<!-- ================= CADASTRO ================= -->
<div id="cadastro" class="aba">

<div id="lista-prestadores-view" class="card">
<button onclick="abrirCadastro()">+ Novo Prestador</button>
<div id="lista-prestadores"></div>
</div>

<div id="cadastro-flow" class="card" style="display:none;">

<div id="etapa-1">
<h3>Dados</h3>
<input id="nomeEmpresa">
<input id="endereco">
<input id="cidade">
<input id="uf">
<input id="cep">
<input id="responsavel">
<input id="contatoResponsavel">
</div>

<div id="etapa-2" style="display:none;">
<h3>Agenda</h3>
<input id="qtdTecnicos" type="number">
<input id="raio" type="number" max="100">
<div id="agenda-cadastro"></div>
</div>

<button onclick="mudarEtapa(-1)">Voltar</button>
<button onclick="mudarEtapa(1)">Próximo</button>
<button onclick="salvarPrestador()">Concluir</button>

</div>
</div>

<!-- ================= PAINEL ================= -->
<div id="painel" class="aba">
<div class="card"></div>
</div>

</div>

<script>

let prestadores = [];
let itensSelecionados = [];
let agendamentos = [];

/* ================= ABAS (CORRIGIDO) ================= */
function trocarAba(id, btn){
document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
document.getElementById(id).classList.add('ativa');

document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
btn.classList.add('ativo');
}

/* ================= CADASTRO ================= */
function abrirCadastro(){
document.getElementById("lista-prestadores-view").style.display="none";
document.getElementById("cadastro-flow").style.display="block";
}

/* SALVAR ================= */
function salvarPrestador(){

let agenda = [...document.querySelectorAll('#agenda-cadastro .selecionado')]
.map(c=>c.innerText);

prestadores.push({
nome:nomeEmpresa.value,
agenda:agenda
});

renderizarListaPrestadores();
atualizarSelectPrestadores();

document.getElementById("cadastro-flow").style.display="none";
document.getElementById("lista-prestadores-view").style.display="block";
}

/* ================= LISTA ================= */
function renderizarListaPrestadores(){
document.getElementById("lista-prestadores").innerHTML =
prestadores.map(p=>`<div class="card">${p.nome}</div>`).join('');
}

function atualizarSelectPrestadores(){
let sel = document.getElementById("selectPrestador");
sel.innerHTML = '<option value="">-- Escolha --</option>';

prestadores.forEach((p,i)=>{
sel.innerHTML += `<option value="${i}">${p.nome}</option>`;
});
}

/* ================= AGENDAMENTO ================= */
function iniciarAgendamento(){

if(prestadores.length === 0){
alert("Cadastre um prestador primeiro");
return;
}

document.getElementById("step-cep").style.display="none";
document.getElementById("step-agendamento").style.display="block";

atualizarSelectPrestadores();
}

/* ================= PRODUTOS (100% ORIGINAL RESTAURADO) ================= */

const produtos = {
    "Telemetria": [
        {desc:"Instalado veículos leves bloqueador", tempo:60},
        {desc:"Instalado veículos leves e pesados + CAN", tempo:60},
        {desc:"Instalado motos ou maquinários", tempo:40},
        {desc:"Instalado veículos leves e pesados", tempo:40}
    ],
    "Identificador": [
        {desc:"Instalado veículos leves e pesados identificador", tempo:60},
        {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90},
        {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60},
        {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}
    ],
    "Trava de ignição": [
        {desc:"Instalado veículos leves imobilizador", tempo:80},
        {desc:"Instalado veículos leves imobilizador RFID", tempo:80},
        {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90},
        {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}
    ],
    "Videotelemetria": [
        {desc:"CobliCam (2 câmeras)", tempo:90},
        {desc:"Cobli Multicam (3 câmeras internas)", tempo:120},
        {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240},
        {desc:"Cobli Multicam (4 câmeras)", tempo:240},
        {desc:"Cobli Multicam (5 câmeras)", tempo:300}
    ]
};

function carregarProdutos(){
let select = document.getElementById("produto");
select.innerHTML = "";

for(let tipo in produtos){
let group = document.createElement("optgroup");
group.label = tipo;

produtos[tipo].forEach(p=>{
let opt = document.createElement("option");
opt.value = p.tempo;
opt.text = p.desc;
group.appendChild(opt);
});

select.appendChild(group);
}
}

/* ================= AGENDAMENTO FINAL ================= */
function renderizarAgendaAgendamento(){

let idx = document.getElementById("selectPrestador").value;
let container = document.getElementById("agenda-agendamento");

container.innerHTML = "";

if(!prestadores[idx]) return;

prestadores[idx].agenda.forEach(h=>{
let div = document.createElement("div");
div.className="cell";
div.innerText=h;
div.onclick=()=>div.classList.toggle("selecionado");
container.appendChild(div);
});
}

function concluirAgendamento(){

let idx = document.getElementById("selectPrestador").value;

if(!prestadores[idx]) return;

let selecionados = [...document.querySelectorAll(".selecionado")]
.map(c=>c.innerText);

agendamentos.push({
prestador:prestadores[idx].nome,
horarios:selecionados,
data:new Date().toLocaleString()
});

document.querySelector("#painel .card").innerHTML =
agendamentos.map(a=>`
<div class="card">
<b>${a.prestador}</b><br>
${a.data}<br>
${a.horarios.join(", ")}
</div>
`).join("");

alert("Agendamento salvo!");
}

</script>

</body>
</html>
