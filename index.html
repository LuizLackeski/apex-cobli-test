<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX - Agenda Prestadores</title>
    <style>
        /* === Estilos Globais === */
        :root {
            --primary: #2F4EA1;
            --primary-dark: #1F3C88;
            --accent: #4da3ff;
            --text: #cbd5e1;
            --bg: #f4f6f8;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:var(--bg); color: #333; }

        .topo { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .topo strong { font-size: 1.2rem; }

        .menu { background: var(--primary-dark); padding: 10px 30px; display: flex; }
        .menu button { background: none; border: none; color: var(--text); margin-right: 20px; padding: 10px 15px; font-size: 16px; cursor: pointer; transition: all 0.2s; border-radius: 4px; }
        .menu button.ativo { color: white; font-weight: bold; background: rgba(255,255,255,0.1); }

        .conteudo { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .aba { display: none; }
        .aba.ativa { display: block; }

        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

        /* Estilos específicos para busca CEP */
        .input-cep { padding: 12px; border: 1px solid #ced4da; border-radius: 8px; width: 300px; margin-right: 10px; font-size: 1rem; }
        
        .status-bar { background-color: #e6f7ed; border: 1px solid #c3e6cb; color: #155724; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }

        .form-group-flex { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        h3 { color: #555; margin-top: 0; font-size: 1.1rem; }
        
        select { flex: 1; min-width: 250px; padding: 10px 15px; border: 1px solid #ced4da; border-radius: 8px; font-size: 1rem; }
        input[type="number"], input[type="text"] { padding: 10px 15px; border: 1px solid #ced4da; border-radius: 8px; font-size: 1rem; }

        button.acao { background: #4C5EB0; color: white; border: none; padding: 10px 25px; font-size: 0.95rem; font-weight: 500; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        button.acao:hover { background: #3c4a8f; }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 20px; }
        .table-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        
        .etapa-nav { display: flex; justify-content: space-between; margin-top: 20px; }
        .dia-btn { border: 1px solid #ccc; background: #fff; padding: 5px; margin: 2px; border-radius: 4px; cursor: pointer; }
        .dia-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<div class="topo">
    <strong>APEX</strong>
    <span>Agenda Prestadores</span>
</div>

<div class="menu">
    <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
    <button onclick="trocarAba('cadastro', this)">Prestadores</button>
    <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">

<div id="consulta" class="aba ativa">
    <div id="step-cep" class="card">
        <h2>Novo Agendamento</h2>
        <p class="subtitle">Fluxo APEX — consulta de localização</p>
        <div style="margin-top: 20px;">
            <input type="text" id="inputCep" class="input-cep" placeholder="Digite o CEP (00000-000)">
            <button class="acao" onclick="buscarCep()">Buscar</button>
        </div>
    </div>

    <div id="step-agendamento" style="display: none;">
        <div class="status-bar">
            <span id="txtLocalizacao">CEP: ---</span>
        </div>

        <div class="card">
            <h3>Produtos e veículos</h3>
            <div class="form-group-flex">
                <select id="produto"></select>
                <input type="number" id="quantidade" value="1" min="1" style="width: 80px;">
                <button class="acao" onclick="adicionarProduto()">+ Add</button>
            </div>
            <div id="lista-produtos" class="table-responsive"></div>
            <div style="text-align: right; margin-top: 15px;">
                <p>Tempo total: <strong id="tempoTotalExibicao">0h</strong></p>
            </div>
        </div>

        <div class="card">
            <h3>Agenda</h3>
            <div id="horarios" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
            <p id="alertaTempo" style="color:red;"></p>
            <button class="acao" onclick="concluirAgendamento()" style="margin-top: 20px;">Concluir Agendamento</button>
            <button onclick="resetarTelaParaInicio()" style="background:transparent; color:#666; border:none; cursor:pointer;">Cancelar/Voltar</button>
        </div>
    </div>
</div>

<div id="cadastro" class="aba">
    <div id="lista-prestadores-view">
        <div class="card">
            <h2>Prestadores</h2>
            <button class="acao" onclick="abrirCadastro()">+ Cadastrar Novo</button>
            <div id="lista-prestadores" style="margin-top: 20px;"></div>
        </div>
    </div>
    <div id="cadastro-flow" style="display:none;">
        <div class="card"><p>Etapa <span id="etapaAtual">1</span> de 4</p></div>
        <div class="card etapa" id="etapa1"><input id="nome" placeholder="Nome"><br><input id="tecnicos" type="number" placeholder="Qtd Técnicos"><br></div>
        <div class="card etapa" id="etapa2" style="display:none;"><input id="endereco" placeholder="Endereço"><br><input id="raio" type="number" placeholder="Raio (km)"></div>
        <div class="card etapa" id="etapa3" style="display:none;"><h3>Definir Agenda</h3><div id="agenda-semana"></div></div>
        <div class="card etapa" id="etapa4" style="display:none;"><h3>Finalizar</h3></div>
        <div class="card etapa-nav">
            <button onclick="voltarEtapa()">Voltar</button>
            <button class="acao" onclick="proximaEtapa()">Próximo</button>
            <button class="acao" id="btnSalvar" style="display: none;" onclick="salvarPrestador()">Salvar</button>
        </div>
    </div>
</div>

<div id="painel" class="aba">
    <div class="card">Hoje: <strong id="hoje">0</strong> | Total: <strong id="total">0</strong></div>
    <div class="card"><div id="lista-agendamentos"></div></div>
</div>

</div>

<script>
    /* === DADOS === */
    const produtos = {
        "Telemetria": [
            {desc:"Instalado veículos leves bloqueador", tempo:60},
            {desc:"Instalado veículos leves e pesados + CAN", tempo:60},
            {desc:"Instalado motos ou maquinários", tempo:40},
            {desc:"Instalado veículos leves e pesados", tempo:40}
        ],
        "Identificador": [
            {desc:"Instalado veículos leves e pesados identificador", tempo:60},
            {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90},
            {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60},
            {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}
        ],
        "Trava de ignição": [
            {desc:"Instalado veículos leves imobilizador", tempo:80},
            {desc:"Instalado veículos leves imobilizador RFID", tempo:80},
            {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90},
            {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}
        ],
        "Videotelemetria": [
            {desc:"CobliCam (2 câmeras)", tempo:90},
            {desc:"Cobli Multicam (3 câmeras internas)", tempo:120},
            {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240},
            {desc:"Cobli Multicam (4 câmeras)", tempo:240},
            {desc:"Cobli Multicam (5 câmeras)", tempo:300}
        ]
    };

    let prestadores = [{nome: "Oficina ABC", agenda: {"Seg":[8,9], "Ter":[14,15]}}];
    let agendamentos = [];
    let itensSelecionados = [];
    let totalHorasNecessarias = 0;
    let horariosSelecionados = [];

    window.onload = () => {
        carregarProdutos();
        renderizarPrestadores();
    };

    function carregarProdutos(){
        let select = document.getElementById("produto");
        Object.keys(produtos).forEach(tipo => {
            let group = document.createElement('optgroup');
            group.label = tipo; // O navegador renderiza isso em negrito
            produtos[tipo].forEach(p => {
                let opt = document.createElement("option");
                opt.value = p.tempo;
                opt.text = `${p.desc} (${p.tempo/60 >= 1 ? (p.tempo/60) + 'h' : p.tempo + 'min'})`;
                group.appendChild(opt);
            });
            select.appendChild(group);
        });
    }

    function buscarCep(){
        const cep = document.getElementById('inputCep').value;
        if(cep.length < 5) { alert("Digite um CEP válido"); return; }
        document.getElementById('txtLocalizacao').innerText = "📍 Localização validada: CEP " + cep;
        document.getElementById('step-cep').style.display = 'none';
        document.getElementById('step-agendamento').style.display = 'block';
        carregarAgendaPrestador();
    }

    function resetarTelaParaInicio(){
        document.getElementById('step-cep').style.display = 'block';
        document.getElementById('step-agendamento').style.display = 'none';
        document.getElementById('inputCep').value = "";
        document.getElementById('lista-produtos').innerHTML = "";
        document.getElementById('tempoTotalExibicao').innerText = "0h";
        itensSelecionados = [];
        horariosSelecionados = [];
    }

    function adicionarProduto(){
        let select = document.getElementById("produto");
        let tempo = parseInt(select.value);
        let qtd = parseInt(document.getElementById("quantidade").value);
        itensSelecionados.push({desc: select.options[select.selectedIndex].text, tempo, qtd});
        renderizarListaProdutos();
    }

    function renderizarListaProdutos(){
        let totalMinutos = itensSelecionados.reduce((acc, i) => acc + (i.tempo * i.qtd), 0);
        totalHorasNecessarias = Math.ceil(totalMinutos / 60);
        document.getElementById("tempoTotalExibicao").innerText = (totalMinutos/60).toFixed(1) + "h";
        let list = document.getElementById("lista-produtos");
        list.innerHTML = itensSelecionados.map((i, idx) => `<div class="table-item">${i.desc} (Qtd: ${i.qtd}) <button class="remove-btn" onclick="itensSelecionados.splice(${idx},1); renderizarListaProdutos();">&times;</button></div>`).join('');
    }

    function carregarAgendaPrestador(){
        let c = document.getElementById("horarios");
        c.innerHTML = "";
        let agenda = prestadores[0].agenda;
        Object.keys(agenda).forEach(d => {
            agenda[d].forEach(h => {
                let b = document.createElement("button");
                b.className = "dia-btn"; b.innerText = `${d} ${h}:00`;
                b.onclick = () => {
                    if(horariosSelecionados.includes(h)) { horariosSelecionados = horariosSelecionados.filter(x=>x!==h); b.style.background=""; }
                    else { horariosSelecionados.push(h); b.style.background="#2F4EA1"; b.style.color="white"; }
                };
                c.appendChild(b);
            });
        });
    }

    function concluirAgendamento(){
        if(horariosSelecionados.length < totalHorasNecessarias) { alert("Selecione os horários necessários"); return; }
        agendamentos.push({prestador: prestadores[0].nome, data: new Date().toLocaleDateString(), horarios: horariosSelecionados});
        alert("Agendado!");
        renderizarPainel();
        resetarTelaParaInicio();
    }

    function renderizarPainel(){
        document.getElementById("hoje").innerText = agendamentos.length;
        document.getElementById("total").innerText = agendamentos.length;
        document.getElementById("lista-agendamentos").innerHTML = agendamentos.map(a => `<div>${a.prestador} - ${a.data}</div>`).join('');
    }

    /* === Funções de Aba e Cadastro (Mantidas) === */
    function trocarAba(id, btn){
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
    }
    // (Demais funções de cadastro e prestadores permanecem conforme seu original)
</script>

</body>
</html>
