<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APEX - Sistema de Agendamento</title>
    <style>
        :root { --primary: #2F4EA1; --bg: #f4f6f8; }
        body { font-family: 'Segoe UI', sans-serif; background:var(--bg); margin:0; padding:20px; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto 20px auto; }
        h2 { color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        button.acao { background: #4C5EB0; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; }
        .dia-btn { border: 1px solid #ccc; background: #fff; padding: 10px; margin: 5px; cursor: pointer; border-radius: 5px; }
        .dia-btn.selecionado { background: #2F4EA1 !important; color: white; border-color: #2F4EA1; }
        #step-agendamento { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Agendamento APEX</h2>
    <div id="step-cep">
        <input type="text" id="inputCep" placeholder="Digite o CEP (00000-000)">
        <button class="acao" onclick="buscarCep()">Buscar Endereço</button>
    </div>

    <div id="step-agendamento">
        <h4 id="txtStatus">Selecione os produtos:</h4>
        <select id="produto"></select>
        <input type="number" id="quantidade" value="1" min="1">
        <button class="acao" onclick="adicionarProduto()">Adicionar Item</button>
        
        <div id="lista-produtos" style="margin: 15px 0; font-size: 0.9em;"></div>
        <p><strong>Total de horas necessárias: <span id="horasNecessarias">0</span>h</strong></p>
        
        <hr>
        <h4>Selecione <span id="horasRestantes">0</span> hora(s) na agenda:</h4>
        <div id="horarios"></div>
        
        <button id="btnConcluir" class="acao" style="background:#28a745; margin-top:20px;" onclick="concluirAgendamento()">Concluir Agendamento</button>
        <button onclick="resetarTudo()" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:10px;">Cancelar e Reiniciar</button>
    </div>
</div>

<script>
    const produtos = { 
        "Telemetria": [{desc:"Veículos leves bloqueador", tempo:60}, {desc:"Veículos leves e pesados", tempo:40}], 
        "Identificador": [{desc:"Identificador + CAN", tempo:90}],
        "Videotelemetria": [{desc:"CobliCam", tempo:90}, {desc:"Cobli Multicam", tempo:120}] 
    };

    let prestadores = [{nome: "Oficina ABC", agenda: ["08:00", "09:00", "10:00", "14:00", "15:00"]}];
    let itensSelecionados = [];
    let slotsNecessarios = 0;
    let slotsSelecionados = [];

    window.onload = () => {
        let select = document.getElementById("produto");
        for (let tipo in produtos) {
            let group = document.createElement('optgroup'); group.label = tipo;
            produtos[tipo].forEach(p => {
                let opt = document.createElement("option"); opt.text = p.desc; opt.value = p.tempo;
                group.appendChild(opt);
            });
            select.appendChild(group);
        }
    };

    function buscarCep() {
        if(prestadores.length === 0) { alert("Nenhum prestador disponível. Cadastre um prestador primeiro."); return; }
        document.getElementById('step-cep').style.display = 'none';
        document.getElementById('step-agendamento').style.display = 'block';
        carregarAgenda();
    }

    function adicionarProduto() {
        let select = document.getElementById("produto");
        itensSelecionados.push({desc: select.options[select.selectedIndex].text, tempo: parseInt(select.value)});
        recalcularRequisitos();
    }

    function recalcularRequisitos() {
        let totalMinutos = itensSelecionados.reduce((acc, i) => acc + i.tempo, 0);
        slotsNecessarios = Math.ceil(totalMinutos / 60);
        document.getElementById("horasNecessarias").innerText = slotsNecessarios;
        document.getElementById("horasRestantes").innerText = slotsNecessarios;
        
        // Renderizar lista
        let lista = document.getElementById("lista-produtos");
        lista.innerHTML = itensSelecionados.map(i => `<div>• ${i.desc}</div>`).join('');
        
        // Resetar seleção de horários se a lista mudar
        slotsSelecionados = [];
        document.querySelectorAll('.dia-btn').forEach(b => b.classList.remove('selecionado'));
    }

    function carregarAgenda() {
        let c = document.getElementById("horarios"); c.innerHTML = "";
        prestadores[0].agenda.forEach(hora => {
            let b = document.createElement("button");
            b.className = "dia-btn"; b.innerText = hora;
            b.onclick = () => {
                if(b.classList.contains("selecionado")) {
                    b.classList.remove("selecionado");
                    slotsSelecionados = slotsSelecionados.filter(h => h !== hora);
                } else {
                    if(slotsSelecionados.length >= slotsNecessarios) {
                        alert("Você já selecionou o total de horas necessárias para este serviço (" + slotsNecessarios + "h).");
                        return;
                    }
                    b.classList.add("selecionado");
                    slotsSelecionados.push(hora);
                }
            };
            c.appendChild(b);
        });
    }

    function concluirAgendamento() {
        if(slotsSelecionados.length < slotsNecessarios) {
            alert("Erro: Você precisa selecionar exatamente " + slotsNecessarios + " horas de agenda.");
            return;
        }
        alert("Agendamento de " + slotsSelecionados.length + "h concluído com sucesso!");
        resetarTudo();
    }

    function resetarTudo() {
        document.getElementById('step-cep').style.display = 'block';
        document.getElementById('step-agendamento').style.display = 'none';
        itensSelecionados = [];
        slotsSelecionados = [];
        document.getElementById("lista-produtos").innerHTML = "";
        document.getElementById("horasNecessarias").innerText = "0";
    }
</script>

</body>
</html>
