<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APEX - Sistema Completo</title>
    <style>
        :root { --primary: #2F4EA1; --bg: #f0f2f5; --text: #334155; }
        body { font-family: 'Inter', -apple-system, sans-serif; background:var(--bg); color: var(--text); margin:0; padding:20px; }
        
        #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f0f0f0; color: #334155; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 10000; border: 1px solid #e5e7eb; font-weight: 600; text-align: center; }

        /* Estilo Card Compacto */
        .card-compact { background: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .card-compact:hover { background: #f8fafc; border-color: var(--primary); }
        .card-compact span { font-size: 0.85rem; flex: 1; margin-right: 10px; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2F4EA1; display: none; align-items: center; justify-content: center; z-index: 20000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .menu { background: #1F3C88; padding: 0 30px; display: flex; align-items: center; }
        .menu button { background: none; border: none; color: #cbd5e1; padding: 15px 20px; cursor: pointer; font-size: 0.9rem; }
        .menu button.ativo { color: white; border-bottom: 3px solid #4da3ff; }
        .menu .user-info { margin-left: auto; color: #ffffff; font-size: 0.8rem; margin-right: 15px; opacity: 0.8; }
        .conteudo { padding: 30px; max-width: 900px; margin: 0 auto; }
        .aba { display: none; } .aba.ativa { display: block; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e5e7eb; }
        button { cursor: pointer; padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 5px; }
        .btn-cancelar { background: #ef4444 !important; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:20001; }
        .modal-card { background: #f0f0f0; color: #334155; padding: 25px; border-radius: 12px; width: 500px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="login-overlay">
    <div class="login-card">
        <h2>APEX Cobli</h2>
        <input type="text" id="loginEmail" placeholder="Informe seu E-mail">
        <button onclick="window.performLogin()">Entrar</button>
    </div>
</div>

<div class="menu">
    <button class="ativo" onclick="window.trocarAba('consulta', this)">Agendamento</button>
    <button onclick="window.trocarAba('cadastro', this)">Prestadores</button>
    <button onclick="window.trocarAba('painel', this)">Painel</button>
    <button onclick="window.trocarAba('dashboard', this)">Dashboard</button>
    <span id="user-display" class="user-info"></span>
    <button class="btn-sair" onclick="window.logout()">Sair</button>
</div>

<div id="modalAviso" class="modal-overlay">
    <div class="modal-card">
        <div id="modalHeader"></div>
        <div id="modalBody"></div>
        <div id="modalFooter"></div>
    </div>
</div>

<div class="conteudo">
    <div id="consulta" class="aba ativa">
        <div id="step-1" class="card">
            <h2>Localização</h2>
            <input type="text" id="inputCep" placeholder="CEP ou Endereço">
            <button onclick="window.proximoPasso(2)">Buscar Prestadores</button>
        </div>
        <div id="step-2" class="card" style="display:none;">
            <h2>Selecione o Prestador</h2>
            <div id="lista-prestadores-selecao"></div>
            <button onclick="window.proximoPasso(1)">Voltar</button>
        </div>
        <div id="step-3" class="card" style="display:none;">
            <h2>Serviços e Agenda</h2>
            <select id="produto"></select>
            <input type="number" id="quantidade" value="1" style="width: 80px;">
            <button onclick="window.adicionarProduto()">Adicionar</button>
            <div id="lista-produtos"></div>
            <h3>Agenda</h3>
            <div id="agenda-agendamento"></div>
            <button onclick="window.proximoPasso(2)">Voltar</button>
            <button onclick="window.validarEAvancar()">Próximo</button>
        </div>
        <div id="step-4" class="card" style="display:none;">
            <h2>Dados do Cliente</h2>
            <input id="ticket" placeholder="Nº Ticket">
            <input id="clienteNome" placeholder="Nome Cliente">
            <input id="solicitante" placeholder="Solicitante">
            <button onclick="window.concluirAgendamentoFinal(this)">Confirmar</button>
        </div>
    </div>

    <div id="cadastro" class="aba">
        <div id="lista-prestadores-view" class="card">
            <div id="btn-novo-container"></div>
            <div id="lista-prestadores"></div>
        </div>
        <div id="cadastro-flow" class="card" style="display:none;">
            <div id="etapa-1"><h3>Dados</h3><input id="nomeEmpresa" placeholder="Nome"><input id="endereco" placeholder="Endereço"><input id="cidade" placeholder="Cidade"><input id="uf" placeholder="UF"><input id="cep" placeholder="CEP"><input id="qtdTecnicos" placeholder="Técnicos"><input id="rangeAtendimento" placeholder="Raio Km"></div>
            <div id="etapa-2" style="display:none;"><h3>Agenda</h3><div id="agenda-cadastro"></div></div>
            <button id="btn-voltar" onclick="window.mudarEtapa(-1)">Voltar</button>
            <button id="btn-proximo" onclick="window.mudarEtapa(1)">Próximo</button>
            <button id="btn-concluir" onclick="window.salvarPrestador(this)">Concluir</button>
        </div>
    </div>

    <div id="painel" class="aba">
        <div class="filtros-painel">
            <input type="text" id="filtroTicket" placeholder="Ticket" oninput="window.renderPainel()">
            <input type="date" id="filtroData" oninput="window.renderPainel()">
            <select id="filtroPrestador" onchange="window.renderPainel()"><option value="">Todos</option></select>
            <button onclick="window.limparFiltros()">Limpar</button>
        </div>
        <div id="painel-conteudo"></div>
    </div>

    <div id="dashboard" class="aba">
        <div class="card">
            <h2>Dashboard</h2>
            <div class="stats-card">TOTAL<br><strong id="dash-total">0</strong></div>
            <div id="dash-prestadores"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://fqaqlofndeihmhkopvan.supabase.co/functions/v1/smart-service';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxYXFsb2ZuZGVpaG1oa29wdmFuIiwicm9sZSI6IkpXVCIsImlhdCI6MTc3NzIyNTg4MiwiZXhwIjoyMDkyODAxODgyfQ.nauPYoB9RDhLLueMEuop2H2FxdChjIxFkAmBcYbJLzc';
    let prestadores = [], itensSelecionados = [], agendamentos = [], etapa = 1, editingIndex = -1, prestadorSelecionadoIndex = null, isAuthorized = false;
    const ADMIN_EMAILS = ["luiz.lackeski@cobli.co", "fernando.souza@cobli.co"]; 
    const produtos = { "Telemetria": [{desc:"Instalado veículos leves bloqueador", tempo:60}], "Identificador": [{desc:"Instalado veículos leves e pesados identificador", tempo:60}], "Trava de ignição": [{desc:"Instalado veículos leves imobilizador", tempo:80}], "Videotelemetria": [{desc:"CobliCam (2 câmeras)", tempo:90}] };

    function getHeaders() { return { 'Content-Type': 'application/json', 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }; }

    window.checkAuth = function() { let email = localStorage.getItem('userEmail'); if (email && email.toLowerCase().endsWith("@cobli.co")) { document.getElementById('login-overlay').style.display = 'none'; isAuthorized = ADMIN_EMAILS.includes(email.toLowerCase()); document.getElementById('user-display').innerText = email; } else { document.getElementById('login-overlay').style.display = 'flex'; } };
    window.performLogin = function() { let e = document.getElementById('loginEmail').value.trim().toLowerCase(); if(!e.endsWith("@cobli.co")) return window.showMessage("E-mail inválido."); localStorage.setItem('userEmail', e); window.location.reload(); };
    window.logout = function() { localStorage.removeItem('userEmail'); window.location.reload(); };

    async function carregarDadosDoBanco() { 
        try { 
            const [resP, resA] = await Promise.all([
                fetch(`${API_URL}/prestadores`, { headers: getHeaders() }),
                fetch(`${API_URL}/agendamentos`, { headers: getHeaders() })
            ]);
            prestadores = resP.ok ? await resP.json() : [];
            agendamentos = resA.ok ? await resA.json() : [];
            window.renderizarListaPrestadores(); window.renderPainel(); window.renderDashboard();
        } catch(e) { console.error(e); } 
    }

    window.renderPainel = function() {
        let ticket = document.getElementById("filtroTicket").value.toLowerCase();
        let dataFiltro = document.getElementById("filtroData").value;
        let pFiltro = document.getElementById("filtroPrestador").value;
        let filtrados = agendamentos.filter(a => {
            let matchTicket = a.ticket.toLowerCase().includes(ticket);
            let matchPrest = !pFiltro || a.prestador === pFiltro;
            return matchTicket && matchPrest;
        });
        document.getElementById("painel-conteudo").innerHTML = filtrados.map(a => `
            <div class="card-compact" onclick="window.detalharAgendamento(${a.id})">
                <span><strong>${a.data}</strong> | #${a.ticket} | ${a.cliente}</span>
                <span>${a.prestador}</span>
                <button onclick="event.stopPropagation(); window.excluirAgendamento(${a.id})" class="btn-cancelar">Excluir</button>
            </div>
        `).join('');
    };

    window.renderDashboard = function() {
        document.getElementById("dash-total").innerText = agendamentos.length;
        let contagem = {}; agendamentos.forEach(a => contagem[a.prestador] = (contagem[a.prestador] || 0) + 1);
        document.getElementById("dash-prestadores").innerHTML = Object.keys(contagem).map(p => `<div>${p}: ${contagem[p]}</div>`).join('');
    };

    window.detalharAgendamento = function(id) {
        let a = agendamentos.find(x => x.id == id);
        if(a) window.exibirModal("Detalhes", `<p>Ticket: ${a.ticket}</p><p>Cliente: ${a.cliente}</p><p>Prestador: ${a.prestador}</p>`);
    };

    window.exibirModal = function(t, h) { document.getElementById('modalHeader').innerText=t; document.getElementById('modalBody').innerHTML=h; document.getElementById('modalAviso').style.display='flex'; };
    window.fecharModal = function() { document.getElementById('modalAviso').style.display='none'; };
    window.showMessage = function(msg) { window.exibirModal("Aviso", msg); };
    window.showToast = function(msg) { let t=document.getElementById("toast"); t.innerText=msg; t.style.display="block"; setTimeout(()=>t.style.display="none", 3000); };

    window.trocarAba = function(id, btn){ document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa')); document.getElementById(id).classList.add('ativa'); document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('ativo')); if(btn) btn.classList.add('ativo'); };
    window.limparFiltros = function(){ document.getElementById("filtroTicket").value=""; document.getElementById("filtroData").value=""; document.getElementById("filtroPrestador").value=""; window.renderPainel(); };
    window.excluirAgendamento = async function(id) { await fetch(`${API_URL}/agendamentos/${id}`, { method: 'DELETE', headers: getHeaders() }); await carregarDadosDoBanco(); window.showToast("Excluído"); };
    
    // Funções placeholder para manter o fluxo funcionando
    window.salvarPrestador = async function(btn){}; window.renderizarListaPrestadores = function(){}; window.adicionarProduto = function(){}; window.renderizarProdutos = function(){}; window.concluirAgendamentoFinal = async function(btn){}; window.mudarEtapa = function(d){}; window.rdaAgendamento = function(){}; window.validarEAvancar = function(){}; window.proximoPasso = async function(n){}; window.consultarDistancia = async function(o, d){}; window.getBlockedHours = function(p, d){ return new Set(); }; window.getOcupacaoSlot = function(p, d, h){ return 0; }; window.carregarProdutos = function(){};

    window.checkAuth();
    window.onload = async () => { window.carregarProdutos(); await carregarDadosDoBanco(); };
</script>
</body>
</html>
