<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX</title>

<style>
body { margin:0; font-family: Arial; background:#f4f6f8; }

.topo { background:#2F4EA1; color:white; padding:15px 30px; display:flex; justify-content:space-between; }
.menu { background:#1F3C88; padding:10px 30px; }

.menu button {
  background:none; border:none; color:#cbd5e1;
  margin-right:20px; font-size:16px; cursor:pointer;
}
.menu button.ativo { color:white; border-bottom:2px solid #4da3ff; }

.conteudo { padding:30px; }
.aba { display:none; }
.ativa { display:block; }

.card {
  background:white; padding:20px;
  border-radius:8px; margin-bottom:20px;
}

input, select { padding:8px; margin:5px; }

button.acao {
  background:#2F4EA1; color:white;
  border:none; padding:8px 15px;
  cursor:pointer; border-radius:4px;
}
</style>
</head>

<body>

<div class="topo">
  <strong>APEX</strong>
  <span>Agenda Prestadores</span>
</div>

<div class="menu">
  <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
  <button onclick="trocarAba('cadastro', this)">Prestadores</button>
  <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">

<!-- AGENDAMENTO -->
<div id="consulta" class="aba ativa">

  <div class="card">
    <h2>Novo Agendamento</h2>
    <button class="acao" onclick="buscar()">Buscar Prestadores</button>
  </div>

  <div id="fluxo-agendamento" style="display:none;">

    <div class="card" id="prestadorSelecionado"></div>

    <div class="card">
      <h3>Produtos</h3>

      <select id="produto"></select>
      <input type="number" id="quantidade" placeholder="Qtd">
      <button class="acao" onclick="adicionarItem()">Adicionar</button>

      <div id="lista-itens"></div>

      <p>Tempo total: <strong id="tempoTotal">0h</strong></p>
    </div>

    <div class="card">
      <h3>Agenda</h3>
      <div id="horarios"></div>
      <p id="alertaTempo" style="color:red;"></p>
      <button class="acao" onclick="concluirAgendamento()">Concluir</button>
    </div>

  </div>

</div>

<!-- CADASTRO -->
<div id="cadastro" class="aba">

  <div id="lista-prestadores-view">
    <div class="card">
      <h2>Prestadores</h2>
      <button class="acao" onclick="abrirCadastro()">+ Cadastrar</button>
      <div id="lista-prestadores"></div>
    </div>
  </div>

  <div id="cadastro-flow" style="display:none;">

    <div class="card">
      <p>Etapa <span id="etapaAtual">1</span> de 4</p>
    </div>

    <div class="card etapa" id="etapa1">
      <input id="nome" placeholder="Nome"><br>
      <input id="tecnicos" type="number" placeholder="Qtd Técnicos"><br>
    </div>

    <div class="card etapa" id="etapa2" style="display:none;">
      <input id="endereco" placeholder="Endereço"><br>
      <input id="raio" type="number" placeholder="Raio 1-100">
    </div>

    <div class="card etapa" id="etapa3" style="display:none;">
      <div id="agenda-semana"></div>
    </div>

    <div class="card etapa" id="etapa4" style="display:none;">
      <button class="acao" onclick="salvarPrestador()">Salvar</button>
    </div>

    <div class="card">
      <button onclick="voltarEtapa()">Voltar</button>
      <button class="acao" onclick="proximaEtapa()">Próximo</button>
    </div>

  </div>

</div>

<!-- PAINEL -->
<div id="painel" class="aba">

  <div class="card">
    Hoje: <strong id="hoje">0</strong><br>
    Total: <strong id="total">0</strong>
  </div>

  <div class="card">
    <div id="lista-agendamentos"></div>
  </div>

</div>

</div>

<script>

/* ===== DADOS ===== */
let prestadores = [];
let agendamentos = [];
let agendaPrestador = {};
let etapa = 1;
let prestadorSelecionadoIndex = null;
let prestadorEditando = null;
let tempoTotal = 0;
let horariosSelecionados = [];
let itensAgendamento = [];

/* ===== PRODUTOS ===== */
const produtos = [
  { nome: "Bloqueador", tempo: 60 },
  { nome: "Telemetria + CAN", tempo: 60 },
  { nome: "Identificador", tempo: 60 },
  { nome: "Identificador + CAN", tempo: 90 },
  { nome: "RFID", tempo: 60 },
  { nome: "RFID + CAN", tempo: 80 },
  { nome: "Imobilizador", tempo: 80 },
  { nome: "Câmeras 2", tempo: 90 },
  { nome: "Multicam 3", tempo: 120 },
  { nome: "Multicam 4", tempo: 240 },
  { nome: "Multicam 5", tempo: 300 }
];

window.onload = function(){
  let select = document.getElementById("produto");
  produtos.forEach((p,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.text=p.nome;
    select.appendChild(o);
  });
}

/* ===== ABAS ===== */
function trocarAba(id, botao){
  document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('ativo'));
  botao.classList.add('ativo');
}

/* ===== CADASTRO ===== */
function abrirCadastro(){
  document.getElementById("lista-prestadores-view").style.display="none";
  document.getElementById("cadastro-flow").style.display="block";
}

function proximaEtapa(){
  if(etapa===2){
    let r=document.getElementById("raio").value;
    if(!r||r<1||r>100){ alert("Raio inválido"); return;}
  }
  if(etapa<4){
    document.getElementById("etapa"+etapa).style.display="none";
    etapa++;
    document.getElementById("etapa"+etapa).style.display="block";
    document.getElementById("etapaAtual").innerText=etapa;
    if(etapa===3) gerarAgenda();
  }
}

function voltarEtapa(){
  if(etapa>1){
    document.getElementById("etapa"+etapa).style.display="none";
    etapa--;
    document.getElementById("etapa"+etapa).style.display="block";
    document.getElementById("etapaAtual").innerText=etapa;
  }
}

function gerarAgenda(){
  const dias=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
  let c=document.getElementById("agenda-semana");
  c.innerHTML="";

  dias.forEach(d=>{
    let div=document.createElement("div");
    div.innerHTML="<strong>"+d+"</strong><br>";
    for(let h=8;h<=18;h++){
      let b=document.createElement("button");
      b.innerText=h;
      b.onclick=()=>{
        if(!agendaPrestador[d]) agendaPrestador[d]=[];
        if(agendaPrestador[d].includes(h)){
          agendaPrestador[d]=agendaPrestador[d].filter(x=>x!==h);
          b.style.background="";
        }else{
          agendaPrestador[d].push(h);
          b.style.background="#2F4EA1";
          b.style.color="white";
        }
      };
      div.appendChild(b);
    }
    c.appendChild(div);
  });
}

function salvarPrestador(){
  let p={
    nome: nome.value,
    endereco: endereco.value,
    tecnicos: tecnicos.value,
    raio: raio.value,
    agenda: JSON.parse(JSON.stringify(agendaPrestador))
  };

  if(prestadorEditando!=null){
    prestadores[prestadorEditando]=p;
    prestadorEditando=null;
  } else {
    prestadores.push(p);
  }

  resetCadastro();
  renderizarPrestadores();
}

function renderizarPrestadores(){
  let l=document.getElementById("lista-prestadores");
  l.innerHTML="";
  prestadores.forEach((p,i)=>{
    let d=document.createElement("div");
    d.innerHTML=`
      <strong>${p.nome}</strong>
      <button onclick="editarPrestador(${i})">Editar</button>
      <button onclick="excluirPrestador(${i})">Excluir</button>
      <hr>`;
    l.appendChild(d);
  });
}

function editarPrestador(i){
  let p=prestadores[i];
  abrirCadastro();
  nome.value=p.nome;
  endereco.value=p.endereco;
  tecnicos.value=p.tecnicos;
  raio.value=p.raio;
  agendaPrestador=p.agenda;
  prestadorEditando=i;
}

function excluirPrestador(i){
  prestadores.splice(i,1);
  renderizarPrestadores();
}

function resetCadastro(){
  document.getElementById("cadastro-flow").style.display="none";
  document.getElementById("lista-prestadores-view").style.display="block";
  etapa=1;
  agendaPrestador={};
  document.querySelectorAll(".etapa").forEach((e,i)=>e.style.display=i===0?"block":"none");
}

/* ===== ITENS ===== */
function adicionarItem(){
  let p=produtos[produto.value];
  let q=parseInt(quantidade.value||0);
  if(!q) return alert("Qtd inválida");

  itensAgendamento.push({nome:p.nome, tempo:p.tempo, qtd:q});
  renderizarItens();
}

function renderizarItens(){
  let c=document.getElementById("lista-itens");
  c.innerHTML="";
  tempoTotal=0;

  itensAgendamento.forEach((i,index)=>{
    tempoTotal += i.tempo * i.qtd;

    let d=document.createElement("div");
    d.innerHTML=`${i.nome} x${i.qtd} 
      <button onclick="removerItem(${index})">X</button>`;
    c.appendChild(d);
  });

  document.getElementById("tempoTotal").innerText=(tempoTotal/60).toFixed(1)+"h";
}

function removerItem(i){
  itensAgendamento.splice(i,1);
  renderizarItens();
}

/* ===== AGENDAMENTO ===== */
function buscar(){
  if(prestadores.length===0) return alert("Cadastre prestador");
  document.getElementById("fluxo-agendamento").style.display="block";

  let c=document.getElementById("prestadorSelecionado");
  c.innerHTML="Escolha:<br>";

  prestadores.forEach((p,i)=>{
    let b=document.createElement("button");
    b.innerText=p.nome;
    b.onclick=()=>selecionarPrestador(i);
    c.appendChild(b);
  });
}

function selecionarPrestador(i){
  prestadorSelecionadoIndex=i;
  agendaPrestador=prestadores[i].agenda;

  document.getElementById("prestadorSelecionado").innerHTML=prestadores[i].nome;
  mostrarAgenda();
}

function mostrarAgenda(){
  let c=document.getElementById("horarios");
  c.innerHTML="";
  horariosSelecionados=[];

  Object.keys(agendaPrestador).forEach(d=>{
    let div=document.createElement("div");
    div.innerHTML="<strong>"+d+"</strong><br>";

    agendaPrestador[d].forEach(h=>{
      let b=document.createElement("button");
      b.innerText=h;

      b.onclick=()=>{
        if(horariosSelecionados.includes(h)){
          horariosSelecionados=horariosSelecionados.filter(x=>x!==h);
          b.style.background="";
        }else{
          horariosSelecionados.push(h);
          b.style.background="#2F4EA1";
          b.style.color="white";
        }
        validarTempo();
      };

      div.appendChild(b);
    });

    c.appendChild(div);
  });
}

function validarTempo(){
  let alerta=document.getElementById("alertaTempo");

  let horasNecessarias=Math.ceil(tempoTotal/60);

  if(horariosSelecionados.length < horasNecessarias){
    alerta.innerText="Tempo insuficiente";
    return;
  }

  if(Math.max(...horariosSelecionados)+1>19){
    alerta.innerText="Excede 19h";
    return;
  }

  alerta.innerText="";
}

function concluirAgendamento(){
  agendamentos.push({
    prestador: prestadores[prestadorSelecionadoIndex].nome,
    data: new Date().toISOString().split("T")[0],
    tempo: tempoTotal
  });

  resetAgendamento();
  renderizarPainel();
}

function resetAgendamento(){
  document.getElementById("fluxo-agendamento").style.display="none";
  document.getElementById("horarios").innerHTML="";
  document.getElementById("tempoTotal").innerText="0h";
  itensAgendamento=[];
  horariosSelecionados=[];
  tempoTotal=0;
}

/* ===== PAINEL ===== */
function renderizarPainel(){
  let hoje=new Date().toISOString().split("T")[0];

  document.getElementById("hoje").innerText=
    agendamentos.filter(a=>a.data===hoje).length;

  document.getElementById("total").innerText=agendamentos.length;

  let l=document.getElementById("lista-agendamentos");
  l.innerHTML="";

  agendamentos.forEach(a=>{
    let d=document.createElement("div");
    d.innerHTML=`${a.prestador} - ${a.data}`;
    l.appendChild(d);
  });
}

</script>

</body>
</html>
