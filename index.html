<script>

/* ================= DADOS ================= */

let prestadores = [];
let itensSelecionados = [];
let etapa = 1;
let editingIndex = -1;
let agendaAtualPrestador = [];

/* ================= INICIAL ================= */

window.onload = () => {

    if(document.getElementById('agenda-cadastro')){
        criarGrid('agenda-cadastro');
    }

    if(document.getElementById('produto')){
        carregarProdutos();
    }
};

/* ================= ABAS ================= */

function trocarAba(id, btn){

let abas = document.querySelectorAll('.aba');
let alvo = document.getElementById(id);

if(!alvo) return;

abas.forEach(a => a.classList.remove('ativa'));
alvo.classList.add('ativa');

document.querySelectorAll('.menu button')
.forEach(b => b.classList.remove('ativo'));

if(btn) btn.classList.add('ativo');
}

/* ================= CADASTRO ================= */

function abrirCadastro(index=-1){

editingIndex = index;

document.getElementById("lista-prestadores-view").style.display="none";
document.getElementById("cadastro-flow").style.display="block";

etapa = 1;

document.getElementById("etapa-1").style.display="block";
document.getElementById("etapa-2").style.display="none";

document.getElementById("btnProximo").style.display="inline";
document.getElementById("btnSalvar").style.display="none";

document.querySelectorAll('#cadastro-flow input').forEach(i=>i.value="");
document.querySelectorAll('#agenda-cadastro .cell').forEach(c=>c.classList.remove('selecionado'));

if(index !== -1){
let p = prestadores[index];

nomeEmpresa.value=p.nome||"";
endereco.value=p.endereco||"";
cidade.value=p.cidade||"";
uf.value=p.uf||"";
cep.value=p.cep||"";
responsavel.value=p.responsavel||"";
contatoResponsavel.value=p.contato||"";
qtdTecnicos.value=p.qtdTecnicos||"";
raio.value=p.raio||"";

p.agenda.forEach(h=>{
document.querySelectorAll('#agenda-cadastro .cell')
.forEach(c=>{ if(c.innerText===h) c.classList.add('selecionado') });
});
}
}

/* ================= ETAPA ================= */

function mudarEtapa(dir){

document.getElementById("etapa-"+etapa).style.display="none";

etapa += dir;

if(etapa < 1) etapa = 1;
if(etapa > 2) etapa = 2;

document.getElementById("etapa-"+etapa).style.display="block";

document.getElementById("btnProximo").style.display = etapa === 2 ? "none" : "inline";
document.getElementById("btnSalvar").style.display = etapa === 2 ? "inline" : "none";
}

/* ================= AGENDA CADASTRO ================= */

function criarGrid(id){

const grid = document.getElementById(id);
grid.innerHTML = "";

const dias = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

dias.forEach(d => {

let row = document.createElement("div");
row.className = "row-dia";

let label = document.createElement("div");
label.innerText = d;
label.style.width = "120px";
label.style.fontWeight = "bold";

row.appendChild(label);

for(let h=8; h<=18; h++){

let cell = document.createElement("div");
cell.className = "cell";
cell.innerText = `${h}:00`;

cell.addEventListener("click", function(){
    this.classList.toggle("selecionado");
});

row.appendChild(cell);
}

grid.appendChild(row);
});
}

/* ================= PRODUTOS ================= */

const produtos = {
    "Telemetria": [
        {desc:"Instalado veículos leves bloqueador", tempo:60},
        {desc:"Instalado veículos leves e pesados + CAN", tempo:60},
        {desc:"Instalado motos ou maquinários", tempo:40},
        {desc:"Instalado veículos leves e pesados", tempo:40}
    ],
    "Identificador": [
        {desc:"Instalado veículos leves e pesados identificador", tempo:60},
        {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90},
        {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60},
        {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}
    ],
    "Trava de ignição": [
        {desc:"Instalado veículos leves imobilizador", tempo:80},
        {desc:"Instalado veículos leves imobilizador RFID", tempo:80},
        {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90},
        {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}
    ],
    "Videotelemetria": [
        {desc:"CobliCam (2 câmeras)", tempo:90},
        {desc:"Cobli Multicam (3 câmeras internas)", tempo:120},
        {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240},
        {desc:"Cobli Multicam (4 câmeras)", tempo:240},
        {desc:"Cobli Multicam (5 câmeras)", tempo:300}
    ]
};

function carregarProdutos(){

let select = document.getElementById("produto");

for(let tipo in produtos){

let group = document.createElement("optgroup");
group.label = tipo;

produtos[tipo].forEach(p=>{
let opt = document.createElement("option");
opt.value = p.tempo;
opt.text = p.desc;
group.appendChild(opt);
});

select.appendChild(group);
}
}

function adicionarProduto(){

let select = document.getElementById("produto");
let qtd = parseInt(document.getElementById("quantidade").value);
let tempo = parseInt(select.value);

itensSelecionados.push({
desc: select.options[select.selectedIndex].text,
tempo: tempo * qtd
});

renderizarProdutos();
}

function renderizarProdutos(){

let div = document.getElementById("lista-produtos");
let total = 0;

div.innerHTML = itensSelecionados.map((i,idx)=>{
total += i.tempo;
return `<div class="item-lista">${i.desc} <button onclick="removerProduto(${idx})">X</button></div>`;
}).join("");

document.getElementById("horasNecessarias").innerText = Math.ceil(total/60);
}

function removerProduto(i){
itensSelecionados.splice(i,1);
renderizarProdutos();
}

/* ================= SALVAR PRESTADOR ================= */

function salvarPrestador(){

let agenda = [];

document.querySelectorAll('#agenda-cadastro .cell.selecionado')
.forEach(c=>agenda.push(c.innerText));

let dados = {
nome:nomeEmpresa.value,
endereco:endereco.value,
cidade:cidade.value,
uf:uf.value,
cep:cep.value,
responsavel:responsavel.value,
contato:contatoResponsavel.value,
qtdTecnicos:qtdTecnicos.value,
raio:Math.min(100,raio.value||0),
agenda:agenda
};

if(editingIndex === -1) prestadores.push(dados);
else prestadores[editingIndex] = dados;

renderizarListaPrestadores();
atualizarSelectPrestadores();

document.getElementById("lista-prestadores-view").style.display="block";
document.getElementById("cadastro-flow").style.display="none";

etapa = 1;
}

/* ================= LISTA ================= */

function renderizarListaPrestadores(){

let l = document.getElementById("lista-prestadores");

l.innerHTML = prestadores.map((p,i)=>
`<div class="card"><strong>${p.nome}</strong>
<button onclick="abrirCadastro(${i})">Editar</button>
<button onclick="excluirPrestador(${i})">Excluir</button></div>`
).join('');
}

function excluirPrestador(i){
prestadores.splice(i,1);
renderizarListaPrestadores();
atualizarSelectPrestadores();
}

function atualizarSelectPrestadores(){

let sel = document.getElementById("selectPrestador");
sel.innerHTML = '<option>-- Escolha --</option>';

prestadores.forEach((p,i)=>{
sel.innerHTML += `<option value="${i}">${p.nome}</option>`;
});
}

/* ================= AGENDAMENTO ================= */

function iniciarAgendamento(){

if(prestadores.length === 0){
alert("Cadastre primeiro");
return;
}

document.getElementById("step-cep").style.display="none";
document.getElementById("step-agendamento").style.display="block";

atualizarSelectPrestadores();
renderizarAgendaAgendamento();
}

function renderizarAgendaAgendamento(){

let idx = document.getElementById("selectPrestador").value;
let container = document.getElementById("agenda-agendamento");

container.innerHTML = "";

if(idx === "" || !prestadores[idx]) return;

agendaAtualPrestador = prestadores[idx].agenda || [];

let agenda = agendaAtualPrestador;

if(agenda.length === 0){
    container.innerHTML = "<p>Prestador sem agenda cadastrada</p>";
    return;
}

let row = document.createElement("div");
row.className = "row-dia";

let label = document.createElement("div");
label.innerText = "Horários disponíveis";
label.style.width = "120px";
label.style.fontWeight = "bold";

row.appendChild(label);

agenda.forEach(h => {

let cell = document.createElement("div");
cell.className = "cell";
cell.innerText = h;

cell.addEventListener("click", function(){

    let max = parseInt(document.getElementById("horasNecessarias").innerText || 0);
    let sel = document.querySelectorAll("#agenda-agendamento .cell.selecionado");

    if(!this.classList.contains("selecionado") && sel.length >= max){
        alert("Limite de horas atingido pelo serviço.");
        return;
    }

    this.classList.toggle("selecionado");
});

row.appendChild(cell);

});

container.appendChild(row);
}

/* ================= AGENDAMENTO FINAL ================= */

function concluirAgendamento(){

let prestadorIndex = document.getElementById("selectPrestador").value;

if(prestadorIndex === "" || !prestadores[prestadorIndex]){
alert("Selecione um prestador");
return;
}

let selecionados = document.querySelectorAll("#agenda-agendamento .cell.selecionado");
let necessario = parseInt(document.getElementById("horasNecessarias").innerText || 0);

if(selecionados.length !== necessario){
alert(`Você precisa selecionar exatamente ${necessario} horários`);
return;
}

let agendamento = {
prestador: prestadores[prestadorIndex].nome,
servicos: [...itensSelecionados],
horarios: [...selecionados].map(c => c.innerText),
data: new Date().toLocaleString()
};

if(!window.agendamentos) window.agendamentos = [];
window.agendamentos.push(agendamento);

renderizarPainel();

alert("Agendamento concluído com sucesso!");

itensSelecionados = [];
document.getElementById("lista-produtos").innerHTML = "";
document.getElementById("horasNecessarias").innerText = "0";

document.querySelectorAll("#agenda-agendamento .cell")
.forEach(c => c.classList.remove("selecionado"));

document.getElementById("step-agendamento").style.display = "none";
document.getElementById("step-cep").style.display = "block";
}

/* ================= PAINEL ================= */

function renderizarPainel(){

let div = document.querySelector("#painel .card");

if(!window.agendamentos || window.agendamentos.length === 0){
div.innerHTML = "Nenhum agendamento ainda.";
return;
}

div.innerHTML = window.agendamentos.map((a)=>{

return `
<div style="border-bottom:1px solid #ddd; padding:10px 0;">
<strong>${a.prestador}</strong><br>
<small>${a.data}</small><br>
<span>Serviços: ${a.servicos.map(s=>s.desc).join(", ")}</span><br>
<span>Horários: ${a.horarios.join(", ")}</span>
</div>
`;

}).join("");

}

</script>
